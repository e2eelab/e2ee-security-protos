syntax = "proto3";

package e2ees;

option java_package = "org.e2eelab.proto.e2ees";
option java_outer_classname = "RemoveUserDeviceRequestProto";
option objc_class_prefix = "Objc";
option swift_prefix="Swift";

import "e2ees/E2eeAddress.proto";
import "e2ees/RemoveUserDeviceMsg.proto";

/**
 * Request for removing user device.
 */
message RemoveUserDeviceRequest {
  E2eeAddress sender_address = 1;   // The sender's address.
  RemoveUserDeviceMsg msg = 2;      // The included msg for this request.
}
