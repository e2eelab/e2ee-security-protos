syntax = "proto3";

package e2ees;

option java_package = "org.e2eelab.proto.e2ees";
option java_outer_classname = "DistributeGroupKeyResponseProto";
option objc_class_prefix = "Objc";
option swift_prefix="Swift";

import "e2ees/GroupMember.proto";
import "e2ees/ResponseCode.proto";

/**
 * Response for distributing a group key to members.
 */
message DistributeGroupKeyResponse {
  ResponseCode code = 1;                              // The response code.
  string msg = 2;                                     // The message.

  repeated GroupMember failed_members = 3;            // Members that failed to receive the key (e.g. no 1:1 session).
}
