syntax = "proto3";

package e2ees;

option java_package = "org.e2eelab.proto.e2ees";
option java_outer_classname = "InviteResponseProto";
option objc_class_prefix = "Objc";
option swift_prefix="Swift";

import "e2ees/ResponseCode.proto";

/**
 * Response for sending an invite msg.
 */
message InviteResponse {
  ResponseCode code = 1;          // The response code returned by the server.
  string msg = 2;                 // The response message returned by the server.

  string session_id = 3;          // The session ID.
  int64 invite_t = 4;             // The server time when the invitation creating this session was issued.
}
