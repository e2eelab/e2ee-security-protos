syntax = "proto3";

package e2ees;

option java_package = "org.e2eelab.proto.e2ees";
option java_outer_classname = "NotifLevelProto";
option objc_class_prefix = "Objc";
option swift_prefix = "Swift";

/**
 * The notification level used to identify the urgency of a msg.
 */
enum NotifLevel {
  NOTIF_LEVEL_NORMAL = 0;         // The server sends no push notification to the device.
  NOTIF_LEVEL_SESSION = 1;        // The server forwards the msg to establish a session.
  NOTIF_LEVEL_PUSH = 11;          // The server sends a push notification to the device.
  NOTIF_LEVEL_STREAM = 12;        // The server sends a push notification with streaming flags to the device.
}
