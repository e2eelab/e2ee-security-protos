syntax = "proto3";

package e2ees;

option java_package = "org.e2eelab.proto.e2ees";
option java_outer_classname = "AliceHelloRequestProto";
option objc_class_prefix = "Objc";
option swift_prefix="Swift";

import "e2ees/AliceHelloMsg.proto";

/**
 * Request for sending an hello msg.
 */
message AliceHelloRequest {
  AliceHelloMsg msg = 1;          // The hello msg carried by this request.
}
