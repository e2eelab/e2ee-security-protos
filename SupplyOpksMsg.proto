syntax = "proto3";

package e2ees;

option java_package = "org.e2eelab.proto.e2ees";
option java_outer_classname = "SupplyOpksMsgProto";
option objc_class_prefix = "Objc";
option swift_prefix="Swift";

import "e2ees/E2eeAddress.proto";

/**
 * Msg for supplying one-time pre-keys.
 */
message SupplyOpksMsg {
  int64 server_t = 1;                 // The server timestamp of the msg.
  uint32 opks_num = 2;                // The number of one-time pre-keys that need to be uploaded.
  E2eeAddress user_address = 3;       // The user's address.
}
