syntax = "proto3";

package e2ees;

option java_package = "org.e2eelab.proto.e2ees";
option java_outer_classname = "AddUserDeviceMsgProto";
option objc_class_prefix = "Objc";
option swift_prefix="Swift";

import "e2ees/E2eeAddress.proto";

/**
 * Msg for adding a user device.
 */
message AddUserDeviceMsg {
  E2eeAddress user_address = 1;                   // The e2ee address of the newly added user device.
  repeated E2eeAddress old_address_list = 2;      // The other e2ee addresses that share the same user ID.
}
