syntax = "proto3";

package e2ees;

option java_package = "org.e2eelab.proto.e2ees";
option java_outer_classname = "GetPreKeyBundleRequestProto";
option objc_class_prefix = "Objc";
option swift_prefix="Swift";

/**
 * Request for getting pre-key bundle.
 */
message GetPreKeyBundleRequest {
  string domain = 1;          // The domain of the target user.
  string user_id = 2;         // The target user's ID.
  string device_id = 3;       // The target user's device ID.
}
