syntax = "proto3";

package e2ees;

option java_package = "org.e2eelab.proto.e2ees";
option java_outer_classname = "GroupMemberInfoProto";
option objc_class_prefix = "Objc";
option swift_prefix="Swift";

import "e2ees/E2eeAddress.proto";

/**
 * The group member information, including the signed public key
 * bound to the member's device.
 */
message GroupMemberInfo {
  E2eeAddress member_address = 1;     // The group member's address.
  bytes sign_public_key = 2;          // The signed public key part of the user's uploaded public identity key.
  // Optional. An existing member's current (post-ADD) sending chain key,
  // supplied to a newly-added/re-added member in the add-member
  // GroupUpdateKeyBundle so it can decrypt messages that member already
  // advanced past. Carried only inside the E2EE pairwise X3DH session (the
  // server never sees it); absent when not bootstrapping a new member.
  bytes current_chain_key = 3;
}
