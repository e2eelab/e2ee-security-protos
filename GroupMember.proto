syntax = "proto3";

package e2ees;

option java_package = "org.e2eelab.proto.e2ees";
option java_outer_classname = "GroupMemberProto";
option objc_class_prefix = "Objc";
option swift_prefix="Swift";

/**
 * The group role.
 */
enum GroupRole {
  GROUP_ROLE_MEMBER = 0;
  GROUP_ROLE_MANAGER = 1;

  GROUP_ROLE_PENDING_MEMBER = 10;
  GROUP_ROLE_PENDING_MANAGER = 11;
}

/**
 * Welcome-bundle delivery state per group member.
 *
 * Default value for legacy GroupMember rows is
 * `WELCOME_STATE_PENDING` (proto-3 default = 0). A one-time backfill
 * mongosh query marks every legacy row as
 * `WELCOME_STATE_ACKED` because by definition those welcomes
 * succeeded (the group is functioning).
 */
enum WelcomeState {
  WELCOME_STATE_PENDING = 0;          // Initial; fan-out hasn't been ACK'd by member.
  WELCOME_STATE_ACKED = 1;            // Member confirmed receipt; safe to skip on retry.
  WELCOME_STATE_FAILED_PERMANENT = 2; // Member rotated keys — admin re-invite needed.
}

/**
 * The group member.
 */
message GroupMember {
  string user_id = 1;                     // The group member's users ID.
  string domain = 2;                      // The group member's domain.
  GroupRole role = 3;                     // The group member's role.

  WelcomeState welcome_state = 11;        // Welcome-bundle delivery state.

  // How many times the server has re-dispatched the welcome bundle
  // for this member via ResendWelcomeBundle. Server increments on
  // each successful re-enqueue; transitions welcome_state to
  // FAILED_PERMANENT and stops re-delivering once the count
  // exceeds the server-side cap (default 10).
  // Resilience-layer Gate 3 — bounded retry. See whitepaper §4.6.
  int32 welcome_attempt_count = 12;
}
