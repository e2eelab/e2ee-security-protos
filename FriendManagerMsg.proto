syntax = "proto3";

package e2ees;

option java_package = "org.e2eelab.proto.e2ees";
option java_outer_classname = "FriendManagerMsgProto";
option objc_class_prefix = "Objc";
option swift_prefix="Swift";

import "e2ees/E2eeAddress.proto";

/**
 * The friend operations.
 */
enum FriendOp {
  FRIEND_OP_ADDING_SEND = 0;
  FRIEND_OP_ADDING_RECEIVE = 1;
  FRIEND_OP_ADDED = 2;
  FRIEND_OP_BLOCKED = 3;
  FRIEND_OP_UNBLOCKED = 4;
  FRIEND_OP_REMOVED = 5;
  FRIEND_OP_UPDATE_MEMONAME = 6;
  FRIEND_OP_RECOMMEND = 7;
}

/**
 * The data object describing a friendship.
 */
message FriendshipDTO {
  int64 modified_date = 1;   // The server time when the friendship was last modified.
  string from_user = 2;      // The address of the user who initiated the friendship.
  string to_user = 3;        // The address of the target user of the friendship.
  string nickname = 4;       // The friend's nickname.
  string memoname = 5;       // The memo name set for the friend.
  int32 block_state = 6;     // The block state of the friendship.
  int32 friend_status = 7;   // The status of the friendship.
}

/**
 * Msg for managing a friendship.
 */
message FriendManagerMsg {
  int64 modified_date = 1;            // The server time when the msg was last modified.
  // protolint:disable:next FIELD_NAMES_LOWER_SNAKE_CASE
  string msgId = 2;                   // The msg ID.
  E2eeAddress user_address = 3;       // The user's address.
  string user_name = 4;               // The user's name.
  FriendOp op = 5;                    // The friend operation carried by this msg.
  FriendshipDTO friend = 6;           // The friendship data.
}
