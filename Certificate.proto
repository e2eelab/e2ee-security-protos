syntax = "proto3";

package e2ees;

option java_package = "org.e2eelab.proto.e2ees";
option java_outer_classname = "CertificateProto";
option objc_class_prefix = "Objc";
option swift_prefix="Swift";

import "e2ees/AlgTypeDs.proto";
import "e2ees/AlgTypeHash.proto";

/**
 * A subject describing a certificate issuer or issuee.
 */
message Subject {
  string cn = 1;              // The common name.
  string domain = 2;          // The domain name.
  string o = 3;               // The organization name.
  repeated string ou = 4;     // The organizational unit names.
}

/**
 * The cert data, carrying the public key, that is provided by an issuee and signed by an issuer.
 */
message Cert {
  Subject issuee = 11;              // The owner of this certificate.
  AlgTypeDs public_key_alg = 12;    // The public key algorithm.
  bytes public_key = 13;            // The public key data.

  Subject issuer = 2;               // The signer of this certificate.
  int64 not_before = 4;             // The time when the certificate becomes valid.
  int64 not_after = 5;              // The time when the certificate expires.
}

/**
 * The certificate message.
 */
message Certificate {
  uint32 version = 1;                             // The version number.
  AlgTypeHash hash_alg = 2;                       // The hash algorithm used to fingerprint the cert data and the signing public key.
  AlgTypeDs signing_alg = 3;                      // The algorithm used to generate the signature.

  Cert cert = 11;                                 // The cert data provided by the issuee.

  bytes cert_fingerprint = 21;                    // The hash value serving as the fingerprint of the cert data.
  bytes signing_public_key_fingerprint = 22;      // The hash value serving as the fingerprint of the signing public key.

  bytes signature = 31;                           // The signature produced with the signing private key owned by the issuer.

  int64 ts = 41;                                  // The time of the latest update to this certificate.
  bool valid = 42;                                // Whether this certificate is valid.
}