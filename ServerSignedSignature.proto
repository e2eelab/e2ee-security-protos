
syntax = "proto3";

package e2ees;

option java_package = "org.e2eelab.proto.e2ees";
option java_outer_classname = "ServerSignedSignatureProto";
option objc_class_prefix = "Objc";
option swift_prefix="Swift";

import "e2ees/AlgTypeDs.proto";
import "e2ees/AlgTypeHash.proto";
import "e2ees/Certificate.proto";

/**
 * The server signed signature.
 */
message ServerSignedSignature {
  uint32 version = 1;                 // The version number.
  AlgTypeHash hash_alg = 2;           // The hash algorithm for creating the fingerprint of the cert attribute and the signing public key.
  AlgTypeDs signing_alg = 3;          // The algorithm for generating the signature.

  Subject signer = 11;                         // The signer information.
  bytes signing_public_key_fingerprint = 12;   // The hash value used as the fingerprint of the signing public key.

  bytes msg_fingerprint = 21;         // The hash value used as the fingerprint of the message to be signed.
  bytes signature = 22;               // The signature of the message, signed by the signer's key.
}
